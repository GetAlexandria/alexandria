name: Upgrade Regression
description: Report a regression after upgrading Alexandria.
title: "[Upgrade Regression]: "
labels:
  - regression
body:
  - type: input
    id: from-version
    attributes:
      label: Upgraded from
      placeholder: 0.8.4
    validations:
      required: true
  - type: input
    id: to-version
    attributes:
      label: Upgraded to
      placeholder: 0.9.0
    validations:
      required: true
  - type: textarea
    id: regression
    attributes:
      label: What broke
      description: Describe the behavior change as concretely as possible.
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Steps, commands, or files needed to reproduce the regression.
    validations:
      required: true
